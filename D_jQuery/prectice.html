<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>이미지 조절 실습</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .container { margin-top: 20px; }

    /* 1. 큰 이미지 기본 스타일 및 hover(110%) 설정 */
    #mainImage {
        width: 500px; /* 초기 너비 */
        height: 300px; /* 초기 높이 */
        transition: transform 0.3s ease;
        cursor: pointer;
    }
    #mainImage:hover {
        transform: scale(1.1); /* 110%로 확대 */
    }

    /* 썸네일 스타일 */
    .img-box {
        width: 150px;
        height: 100px;
        margin: 5px;
        cursor: pointer;
        object-fit: cover;
    }

    /* 선택된 썸네일 강조 */
    .active-thumb { border: 3px solid blue; }

    .control-group { margin: 15px 0; }
  </style>
</head>
<body>

<div class="container border p-4">
  <h5>썸네일 → 큰 이미지 변경 + 크기 조절</h5>

  <div style="overflow: hidden; display: inline-block;"> <img id="mainImage" src="/images/americano01.png" class="mb-3">
  </div>

  <div class="control-group d-flex gap-2">
    <input type="number" id="widthInput" class="form-control" placeholder="너비(px)" style="width: 200px;">
    <input type="number" id="heightInput" class="form-control" placeholder="높이(px)" style="width: 200px;">
    <button id="resizeBtn" class="btn btn-primary">크기 변경</button>
  </div>

  <div>
    <img src="/images/americano01.png" class="img-box thumb-image active-thumb">
    <img src="/images/whitewine02.png" class="img-box thumb-image">
    <img src="/images/brioche_02.png" class="img-box thumb-image">
  </div>
</div>

<script>
  $(function () {
      // [요구사항 2] 하단 작은 이미지 클릭 시 큰 이미지 변경
      $(".thumb-image").click(function() {
          // attr() 사용: 클릭한 요소의 src를 가져와 메인에 적용
          const newSrc = $(this).attr("src");
          $("#mainImage").attr("src", newSrc);

          // removeClass() / addClass() 사용: 테두리 효과 이동
          $(".thumb-image").removeClass("active-thumb");
          $(this).addClass("active-thumb");
      });

      // [요구사항 3] 크기 변경 버튼 클릭 시 정보 변경
      $("#resizeBtn").click(function() {
          // val() 사용: 입력된 값 가져오기
          const w = $("#widthInput").val();
          const h = $("#heightInput").val();

          // css() 사용: 메인 이미지에 크기 적용
          if (w !== "") {
              $("#mainImage").css("width", w + "px");
          }
          if (h !== "") {
              $("#mainImage").css("height", h + "px");
          }
      });
  });
</script>

</body>
</html>
