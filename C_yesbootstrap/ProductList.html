<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">
    <h1 class="my-4">상품 목록 페이지</h1>

    <!-- 관리자 전용 버튼 -->
    <div class="d-flex justify-content-start">
        <a href="/product/insert">
            <button id="insertBtn" onclick="register()" class="btn btn-primary mb-3">상품 등록</button>
        </a>
    </div>

    <!-- 상품 목록 -->
    <div class="row" id="productContainer">
        <!-- JS로 카드 생성 -->
    </div>
</div>


<script>
    /* 사용자 정보 */
    const user = {
        role: 'ADMIN' // USER, ADMIN
    }

    /* 상품_목록 */
    const products = [
        {id: 1, name: "아메리카노", price: 4000, image: "/images/americano01.png"},
        {id: 2, name: "브리오슈", price: 6000, image: "/images/brioche_02.png"},
        {id: 3, name: "카푸치노", price: 5000, image: "/images/cappuccino02.png"},
        {id: 4, name: "치아바타", price: 5000, image: "/images/ciabatta_02.png"},
        {id: 5, name: "크로아상", price: 3000, image: "/images/croissant_02.png"},
        {id: 6, name: "프렌치바게트", price: 6500, image: "/images/french_baguette_01.png"}
    ];

    /* 관리자가 아니면 상품 등록 버튼 숨길 */
    if (user.role !== 'ADMIN') {
        // 화면에서 안보이고, 실제 공간도 없어짐
        document.getElementById("insertBtn").style.display = "none";
    }

    const container = document.getElementById("productContainer");

    /*상품_배열을_반복하여 목록 생성하기*/
    products.forEach(item => {
        // createElement : 자바 스크립트로 태그를 동적으로 생성
        const col = document.createElement("div");
        col.className = "col-md-4 mb-4";

        col.innerHTML = `
            <div class="card h-100" style="cursor:pointer;" onclick="goDetail(${item.id})">
                <img src="${item.image}" class="card-img-top" style="height:200px;">
                <div class="card-body">
                    <table style="width:100%; border-collapse:collapse;">
                        <tr>
                            <td style="width:70%;">
                                <h5>${item.name} (${item.id})</h5>
                            </td>
                            <td rowspan="2" style="text-align:center;" id="admin-${item.id}">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                가격 : ${item.price.toLocaleString()} 원
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
        `;

        // console.log(item.name);
        container.appendChild(col)

        // 관리자일때 수정, 삭제 버튼 추가
        if (user.role === 'ADMIN') {
            const adminDiv = document.getElementById(`admin-${item.id}`);
            adminDiv.innerHTML = `
                <button class="btn btn-warning btn-sm mb-1" onclick="event.stopPropagation(); edit(${item.id})">수정</button>
                <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); remove(${item.id}, '${item.name}')">삭제</button>
            `;
        }
    })

    function register(){
        alert('상품 등록 완료')
    }

    function goDetail(id){
        //alert('상세 페이지 이동 :' + id);
        location.href = `ProductDetailNew.html?id=${id}`;
    }

    function edit(id){
        alert("수정 페이지 이동: " + id);
    }

    function remove(id, name){
        let text;
        if (confirm(`${name} 상품을 삭제하시겠습니까?`) == true) {
            text = `${name} 삭제 완료`;
            alert(text);
        } else {
            text = `${name} 삭제 취소`;
            alert(text);
        }
    }

</script>
</body>
</html>
