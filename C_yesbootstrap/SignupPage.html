<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>회원 가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            border: 1px solid lightgray;
            border-radius: 5px;
            width: 500px;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="text-center mt-3">회원 가입</h2>
    <form id="productform">
        <!-- 이름 -->
        <div class="row mb-3 mt-3">
            <label class="col-sm-3 col-form-label" for="name">이름</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="name"
                       placeholder="이름을 입력해 주세요." name="name">
                <div class="invalid-feedback">이름 오류</div>
            </div>
        </div>

        <!-- 이메일 -->
        <div class="row mb-3 mt-3">
            <label class="col-sm-3 col-form-label" for="email">이메일</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="email"
                       placeholder="이메일을 입력해 주세요." name="email">
                <div class="invalid-feedback">이메일 오류</div>
            </div>
        </div>

        <!-- 비밀번호 -->
        <div class="row mb-3 mt-3">
            <label class="col-sm-3 col-form-label" for="password">비밀번호</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="password"
                       placeholder="비밀 번호을 입력해 주세요." name="password">
                <div class="invalid-feedback">비밀 번호 오류</div>
            </div>
        </div>

        <!-- 주소 -->
        <div class="row mb-3 mt-3">
            <label class="col-sm-3 col-form-label" for="address">주소</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="address"
                       placeholder="주소를 입력해 주세요." name="address">
                <div class="invalid-feedback">주소 오류</div>
            </div>
        </div>


        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg mb-3">회원 가입</button>
        </div>

    </form>
</div>
</body>
</html>
