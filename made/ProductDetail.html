<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">
    <div class="mb-3">
        <button class="btn btn-secondary btn-sm" onclick="showLoading()">Loading</button>
        <button class="btn btn-danger btn-sm" onclick="showError()">No Data</button>
        <button class="btn btn-success btn-sm" onclick="showSuccess()">Success</button>
    </div>

    <!--로딩 화면-->
    <div id="loadingView" class="text-center">
        <h3>상품 정보를 로딩중입니다.</h3>
    </div>

    <!--데이터 없음-->
    <div id="errorView" class="text-center" style="display: none;">
        <h3>상품 정보를 찾을 수 없습니다.</h3>
    </div>

    <!--정상 화면-->
    <div id="successView" style="display: none;">
        <div class="card">
            <div class="row">
                <!--좌측 이미지-->
                <div class="col-md-4">
                    <img src="/images/americano01.png" class="rounded"
                         alt="아메리카노" style="width: 100%; height: 400px;">
                </div>

                <!--우측 이미지-->
                <div class="col-md-8">
                    <div class="card-body">
                        <h3>아메리카노</h3>

                        <table class="table table-striped">
                            <tbody>
                            <tr>
                                <td class="text-center">가격</td>
                                <td>4,000원</td>
                            </tr>
                            <tr>
                                <td class="text-center">카테고리</td>
                                <td>빵</td>
                            </tr>
                            <tr>
                                <td class="text-center">재고</td>
                                <td>10개</td>
                            </tr>
                            <tr>
                                <td class="text-center">설명</td>
                                <td>프랑스에서 유래한 버터가 많이 들어간 달콤하고 부드러운 빵입니다.</td>
                            </tr>
                            <tr>
                                <td class="text-center">등록일자</td>
                                <td>2026-03-20</td>
                            </tr>
                            </tbody>
                        </table>

                        <!-- 구매 수량 -->
                        <div class="row mb-3 align-items-center">
                            <div class="col-3 text-center">
                                <strong>구매 수량</strong>
                            </div>
                            <div class="col-5">
                                <input type="number" min="1" value="1" class="form-control">
                            </div>
                        </div>

                        <!-- 버튼 -->
                        <div class="d-flex justify-content-center mt-3">
                            <a href="/product/list" class="btn btn-primary me-3 px-4">
                                이전 목록
                            </a>
                            <button class="btn btn-success me-3 px-4"
                                    onclick="alert('장바구니 기능 (예시)')">
                                장바구니
                            </button>
                            <button class="btn btn-danger me-3 px-4">
                                주문하기
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function showLoading(){
        document.getElementById("loadingView").style.display = "block";
        document.getElementById("errorView").style.display = "none";
        document.getElementById("successView").style.display = "none";
    }
    function showError(){
        document.getElementById("loadingView").style.display = "none";
        document.getElementById("errorView").style.display = "block";
        document.getElementById("successView").style.display = "none";
    }
    function showSuccess(){
        document.getElementById("loadingView").style.display = "none";
        document.getElementById("errorView").style.display = "none";
        document.getElementById("successView").style.display = "block";
    }
</script>
</body>
</html>
